services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-digitization-db
    environment:
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic
      POSTGRES_DB: clinic_db
    ports:
      - "5432:5432"
    volumes:
      - clinic_pg_data:/var/lib/postgresql/data

volumes:
  clinic_pg_data:
